<!DOCTYPE html>
<html lang="en">
<head>
    <title>Event Organizer Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #111;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-container {
    width: 900px;
    height: 480px;
    background: #fff;
    display: flex;
    border-radius: 10px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    overflow: hidden;
}

.left {
    width: 55%;
    background: #f7f9fc;
    display: flex;
    justify-content: center;
    align-items: center;
}

.left img {
    width: 80%;
    height: auto;
}

.right {
    width: 45%;
    padding: 50px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.right h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
    position: relative;
    padding-bottom: 10px;
}

.right h2::after {
    content: "";
    width: 60px;
    height: 3px;
    background: #4a90e2;
    position: absolute;
    left: 50%;
    bottom: 0;
    transform: translateX(-50%);
}

.right input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 14px;
}

.right input:focus {
    outline: none;
    border-color: #4a90e2;
}


.btn-center {
    text-align: center;
    margin-top: 10px;
}

.login-btn {
    width: 70%;
    background: #4a90e2;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 15px;
}

.login-btn:hover {
    background: #357bd8;
}

.note {
    font-size: 12px;
    color: #888;
    margin-top: 15px;
    text-align: center;
}


@media (max-width: 900px) {
    .login-container {
        flex-direction: column;
        width: 90%;
        height: auto;
    }

    .left {
        width: 100%;
        height: 200px;
    }

    .right {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="login-container">

    
    <div class="left">
        <img src="images/photo16.jpg" alt="Login Image">
    </div>

   
    <div class="right">
        <h2>Event Organizer Login</h2>

        <form action="eventorganizerservlate" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>

            <div class="btn-center">
                <input type="submit" value="Login" class="login-btn">
            </div>
        </form>

        <p class="note">Only authorized event organizers can login</p>
    </div>

</div>

</body>
</html>
