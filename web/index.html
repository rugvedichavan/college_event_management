<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Event Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *
        {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body
        {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
                        url("images/photo1.jpg") no-repeat center center/cover;
            display: flex;
            flex-direction: column;
        }
        header 
        {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        .main
        {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px;
        }
        .main h3 
        {
            font-size: 30px;
            font-weight:800;
            margin-bottom: 20px;
           color: whitesmoke;
        }
        .main h2 
        {
            font-size: 30px;
            font-weight: 700;
            margin-bottom:40px;
        }
        .main h1 
        {
            font-size: 42px;
            font-weight: 700;
            margin-bottom:0px;
        }
        .main p
        {
            font-size: 18px;
            opacity: 0.85;
            margin-bottom: 50px;
        }
        .card-container
        {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card
        {
            width: 300px;
            padding: 35px 25px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            transition: 0.4s ease;
        }
        .card:hover 
        {
            transform: translateY(-10px);
            box-shadow: 0 40px 500px rgba(0,0,0,0.8);
        }
        .card h2 
        {
            margin-bottom: 20px;
            font-weight: 600;
        }
        .card a
        {
            display: block;
            text-decoration: none;
            padding: 12px;
            margin-top: 12px;
            border-radius: 8px;
            font-weight: 500;
            transition: 0.3s ease;
        }
        .btn-primary
        {
            background: #3498db;
            color: white;
        }
        .btn-primary:hover
        {
            background: #1f78c1;
        }
        .btn-success
        {
            background: #27ae60;
            color: white;
        }
        .btn-success:hover
        {
            background: #1e8449;
        }
        footer
        {
            text-align: center;
            padding: 15px;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 14px;
        }
        @media(max-width: 768px)
        {
            .main h1 
            {
                font-size: 28px;
            }
            .card-container
            {
                gap: 20px;
            }
        }

    </style>
</head>
<body>
    <div class="main">
        <h1>Welcome to Institute of Management & Rural Development Administration</h1>
        <h2>IMRDA</h2>
        <h3>College Event Management System</h3>
        <div class="card-container">
            
            <div class="card">
                <h2>Admin</h2>
                <a href="adminlogin.html" class="btn-primary">Admin Login</a>
            </div>
            
            <div class="card">
                <h2>Event Organizer</h2>
                <a href="eventorganizer.html" class="btn-primary">Organizer Login</a>
            </div>

            <div class="card">
                <h2>Student</h2>
                <a href="studlogin.html" class="btn-primary">Student Login</a>
                <a href="studnewreg.html" class="btn-success">Student Sign In</a>
            </div>
        </div>
    </div>
</body>
</html>
