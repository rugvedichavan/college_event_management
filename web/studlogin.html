<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
        background: url("images/photoevent.jpg") no-repeat center top/cover;
    position:relative;
}
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#ff758c,#667eea);
    opacity:0.8;
    z-index:0;
}
.container{
    width:350px;
    height:500px;
    position:relative;
    z-index:1;
}
.top-box{
    height:200px;
    background:linear-gradient(135deg,#ff758c,#667eea);
    border-radius:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:26px;
    font-weight:600;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    width:400px;
    margin: auto;
}
.login-box{
    background:white;
    padding:100px;
   width:400px;
    border-radius:40px 40px 30px 30px;
    margin-top:-10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
    color:#4b3f72;
}

.input-box{
    margin-bottom:15px;
}

.input-box input{
    width:100%;
    padding:10px;
    border:none;
    background:#f0f0f0;
    border-radius:6px;
    outline:none;
}

.btn{
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
    background:#6c63ff;
    color:white;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

.btn:hover{
    background:#574fd6;
}

.signup-link{
    text-align:center;
    margin-top:15px;
    font-size:14px;
}

.signup-link a{
    color:#6c63ff;
    text-decoration:none;
    font-weight:600;
}

</style>
</head>
<body>

<div class="container">

    

    <div class="login-box">
        <h2>Login</h2>

        <form action="studloginservlet" method="post">

            <div class="input-box">
                <input type="text" name="email" placeholder="Email" required>
            </div>

            <div class="input-box">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit" class="btn">Login</button>

        </form>

        

    </div>

</div>

</body>
</html>
