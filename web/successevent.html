<!DOCTYPE html>
<html>
<head>
    <title>Success</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .success-box {
            background: #ffffff;
            width: 420px;
            padding: 35px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        .success-box h2 {
            color: #2ecc71;
            margin-bottom: 15px;
        }

        .success-box p {
            color: #555;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            padding: 12px 20px;
            background: #4a90e2;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            display: inline-block;
        }

        .btn:hover {
            background: #357bd8;
        }

        .btn-back {
            background: #6c757d;
        }

        .btn-back:hover {
            background: #5a6268;
        }
    </style>
</head>

<body>

<div class="success-box">
    <h2>✔ Event  Created Successfully</h2>
    <p>The Event has been added to the system.</p>

    <div class="btn-group">
        <a href="createevent.html" class="btn">Create Another</a>
        <a href="eventorganizerdashboard.html" class="btn btn-back">Back</a>
    </div>
