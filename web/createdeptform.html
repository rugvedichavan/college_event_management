<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create Department</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: url("images/dept.jpg") no-repeat center center fixed;
        background-size: cover;
}
.container {
    width: 600px;
    background: linear-gradient(to right, #4e73df, #1cc88a);
    margin: 60px auto;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}
h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
    font-size: 30px;
 
}
.form-group {
    margin-bottom: 15px;
}

label {
    font-weight: bold;
    display: block;
    margin-bottom: 5px;
}

input, select {
    width: 100%;
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
}
input[readonly] {
    background-color: #f0f0f0;
}
button {
    width: 100%;
    padding: 10px;
    background: black;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #2e59d9;
}

</style>
</head>

<body>

<div class="container">

    <h2>Create Department</h2>

    <form action="createdeptservlet" method="post">

      
        <div class="form-group">
            <label>College Name</label>
            <input type="text" name="collegename" value="Institute of Management & Rural Development Administration(IMRDA)" readonly>
        </div>

        <div class="form-group">
            <label>College Email</label>
            <input type="email" name="collegeemail" value="imrda@bharatividyapeeth.edu" readonly>
        </div>

        <div class="form-group">
            <label>College Code</label>
            <input type="text" name="collegecode" value="24" readonly>
        </div>

        <div class="form-group">
            <label>College Address</label>
            <input type="text" name="collegeaddress" value="Bharati Vidyapeeth Bhavan, Rajwada Chowk, Sangli - 416416, Maharashtra" readonly>
        </div>

       
        <div class="form-group">
            <label>Course</label>
            <input type="text" name="course" placeholder="Enter Course (e.g., BCA, MCA)" required>
        </div>

        
        <div class="form-group">
            <label>Batch</label>
            <input type="text" name="batch" placeholder="Enter Batch (e.g., A,B)" required>
        </div>


        <button type="submit">Create Department</button>

    </form>

</div>
    <a href="adminlogin.html" class="back-btn">Back</a>

</body>
</html>
