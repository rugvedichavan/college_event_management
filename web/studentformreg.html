<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Registration</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: url("images/student.webp") no-repeat center center fixed;
        background-size: cover;
        background-position: center;  
    background-repeat: no-repeat;  
    height: 100vh;
}

.container {
    width: 600px;
    background: #fff;
    margin: 50px auto;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
}

.form-group {
    margin-bottom: 15px;
}

label {
    font-weight: bold;
    display: block;
    margin-bottom: 5px;
}

input[type="text"],
input[type="email"],
input[type="file"] {
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.gender-group {
    display: flex;
    gap: 20px;
    margin-top: 5px;
}

.gender-group label {
    font-weight: normal;
}

button {
    width: 100%;
    padding: 10px;
    background: black;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #434190;
}

</style>
</head>

<body>

<div class="container">

    <h2>Student Registration Form</h2>

    <form action="StudentRegisterServletself" method="post" enctype="multipart/form-data">
            
        <div class="form-group">
            <label>College Name</label>
            <input type="text" name="collegename" value="Institute of Management & Rural Development Administration(IMRDA)" readonly>
        </div>

        <div class="form-group">
            <label>College Email</label>
            <input type="email" name="collegeemail" value="imrda@bharatividyapeeth.edu" readonly>
        </div>

        <div class="form-group">
            <label>College Code</label>
            <input type="text" name="collegecode" value="24" readonly>
        </div>

        <div class="form-group">
            <label>Student Name</label>
            <input type="text" name="studentname" placeholder="Enter full name" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter email address" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <div class="gender-group">
                <label>
                    <input type="radio" name="gender" value="Male" required> Male
                </label>

                <label>
                    <input type="radio" name="gender" value="Female"> Female
                </label>

                <label>
                    <input type="radio" name="gender" value="Other"> Other
                </label>
            </div>
        </div>

        <div class="form-group">
            <label>Course</label>
            <input type="text" name="course" placeholder="Enter course (BCA/BBA/MCA/MBA)" required>
        </div>

        <div class="form-group">
            <label>Batch</label>
            <input type="text" name="batch" placeholder="Enter batch (A,B)" required>
        </div>

        <div class="form-group">
            <label>PRN Number</label>
            <input type="text" name="prn" placeholder="Enter PRN number" required>
        </div>

        <div class="form-group">
            <label>Upload Photo</label>
            <input type="file" name="photo" accept="image/*" required>
        </div>

        <div class="form-group">
            <label>Upload ID Card</label>
            <input type="file" name="idcard" accept="image/*,application/pdf" required>
        </div>

        <button type="submit">Register</button>

    </form>

</div>

</body>
</html>
